<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全球經濟地球儀</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-weight:600}
#app{display:flex;height:100vh;overflow:hidden}
#globe-wrap{flex:1;position:relative;overflow:hidden;background:#000}
#globe-canvas{display:block;width:100%;height:100%;cursor:grab}
#globe-canvas:active{cursor:grabbing}
#search-box{position:absolute;top:20px;left:50%;transform:translateX(-50%);width:300px;z-index:10}
#search-input{width:100%;padding:10px 18px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.14);border-radius:24px;color:#fff;font-size:14px;font-weight:600;outline:none;backdrop-filter:blur(12px)}
#search-input::placeholder{color:rgba(255,255,255,0.28);font-weight:400}
#search-input:focus{border-color:rgba(255,255,255,0.3)}
#search-results{display:none;margin-top:6px;background:rgba(0,0,0,0.96);border:1px solid rgba(255,255,255,0.1);border-radius:12px;overflow:hidden;backdrop-filter:blur(12px)}
.sr-item{padding:10px 18px;font-size:13px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.06);color:#bbb;font-weight:500}
.sr-item:last-child{border-bottom:none}
.sr-item:hover{background:rgba(255,255,255,0.06);color:#fff}
#tooltip{position:absolute;background:rgba(0,0,0,0.92);color:#fff;border:1px solid rgba(255,255,255,0.15);border-radius:6px;padding:5px 13px;font-size:13px;font-weight:700;pointer-events:none;display:none;white-space:nowrap}
#loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;background:#000;z-index:100;transition:opacity .4s}
.ld-spin{width:44px;height:44px;border:2px solid rgba(255,255,255,0.06);border-top-color:#fff;border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-txt{color:#333;font-size:14px;font-weight:400}
#sidebar{width:330px;min-width:330px;background:#000;border-left:1px solid #0f0f0f;display:flex;flex-direction:column;overflow:hidden}
#hero{padding:28px 22px;flex:1;display:flex;flex-direction:column;justify-content:center}
.hero-title{font-size:18px;font-weight:700;color:#fff;margin-bottom:10px;letter-spacing:-.02em}
.hero-desc{font-size:13px;color:#333;line-height:1.9;font-weight:400}
.hero-hint{margin-top:20px;padding:14px 16px;background:rgba(255,255,255,0.02);border:1px solid #0f0f0f;border-radius:10px;font-size:12px;color:#333;line-height:2.1;font-weight:400}
.hero-hint strong{color:#444;display:block;margin-bottom:4px;font-size:10px;text-transform:uppercase;letter-spacing:.1em}
#country-info{display:none;flex-direction:column;flex:1;overflow:hidden}
#country-header{padding:18px 22px 12px;border-bottom:1px solid #0f0f0f;flex-shrink:0}
.c-name{font-size:20px;font-weight:700;color:#fff;line-height:1.2;letter-spacing:-.02em}
.c-sub{font-size:11.5px;color:#777;margin-top:3px;font-weight:400}
#tab-nav{display:flex;padding:0 22px;border-bottom:1px solid #0f0f0f;flex-shrink:0}
.tab-btn{background:none;border:none;border-bottom:2px solid transparent;padding:10px 10px;color:#555;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;margin-bottom:-1px}
.tab-btn:hover{color:#666}
.tab-btn.active{color:#fff;border-bottom-color:#fff}
#tab-panels{flex:1;overflow-y:auto;padding:16px 22px}
#tab-panels::-webkit-scrollbar{width:3px}
#tab-panels::-webkit-scrollbar-track{background:transparent}
#tab-panels::-webkit-scrollbar-thumb{background:#111;border-radius:2px}
.panel{display:none}
.panel.active{display:block}
.metric{display:flex;justify-content:space-between;align-items:baseline;padding:8px 0;border-bottom:1px solid #0a0a0a;font-size:13px}
.m-lbl{color:#ccc;font-weight:400}
.m-val{color:#fff;font-weight:700}
.sec-title{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.12em;margin:16px 0 8px;font-weight:700}
/* Trade items — bar chart */
.ti-row{margin:7px 0}
.ti-top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.ti-name{color:#bbb;font-weight:400}
.ti-val{color:#fff;font-weight:700}
.ti-bg{background:rgba(255,255,255,0.04);border-radius:3px;height:6px;overflow:hidden}
.ti-fill{height:100%;border-radius:3px;transition:width .4s}
.ti-exp{background:linear-gradient(90deg,#0a3266,#2a6acc)}
.ti-imp{background:linear-gradient(90deg,#660a14,#cc2a3a)}
/* Agriculture */
.agri-row{margin:8px 0}
.agri-top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.agri-name{color:#bbb;font-weight:400}
.agri-val{color:#fff;font-weight:700}
.agri-bg{background:rgba(255,255,255,0.04);border-radius:3px;height:6px;overflow:hidden}
.agri-fill{background:linear-gradient(90deg,#0a3214,#2acc5a);height:100%;border-radius:3px}
/* Population bars */
.pop-bar-row{margin:6px 0}
.pop-bar-top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.pop-bar-bg{background:rgba(255,255,255,0.04);border-radius:3px;height:6px;overflow:hidden}
.pop-bar-fill{height:100%;border-radius:3px}
/* Bilateral trade */
.trade-row{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.trade-row select{flex:1;background:#080808;border:1px solid #1a1a1a;border-radius:6px;color:#fff;padding:7px 9px;font-size:12.5px;font-weight:600;outline:none}
.trade-btn{background:rgba(255,255,255,0.04);border:1px solid #1a1a1a;border-radius:6px;color:#666;padding:8px 0;cursor:pointer;font-size:13px;font-weight:700;width:100%;transition:all .15s}
.trade-btn:hover{background:rgba(255,255,255,0.07);color:#fff}
.trade-card{background:#060606;border-radius:9px;padding:12px;flex:1;border:1px solid #111}
.trade-card-lbl{font-size:11px;color:#888;margin-bottom:4px;font-weight:400}
.trade-card-gdp{font-size:14px;color:#fff;font-weight:700}
.trade-card-gpc{font-size:11.5px;color:#666;margin-top:2px;font-weight:400}
</style>
</head>
<body>
<div id="app">
  <div id="globe-wrap">
    <canvas id="globe-canvas"></canvas>
    <div id="search-box">
      <input type="text" id="search-input" placeholder="搜尋國家… Search country" autocomplete="off">
      <div id="search-results"></div>
    </div>
    <div id="tooltip"></div>
    <div id="loading"><div class="ld-spin"></div><div class="ld-txt">載入地球資料中…</div></div>
  </div>
  <div id="sidebar">
    <div id="hero">
      <div class="hero-title">全球經濟地球儀</div>
      <div class="hero-desc">互動式 3D 地球<br>涵蓋全球前 25 大 GDP 國家<br>完整經濟、人口、貿易數據</div>
      <div class="hero-hint">
        <strong>操作說明</strong>
        🌍 點擊地球上的國家查看數據<br>
        🔍 使用搜尋欄快速定位國家<br>
        🖱 拖曳旋轉地球<br>
        ⇄ 貿易分頁可比較任意兩國差額
      </div>
    </div>
    <div id="country-info">
      <div id="country-header">
        <div class="c-name" id="c-name">—</div>
        <div class="c-sub" id="c-sub">—</div>
      </div>
      <div id="tab-nav">
        <button class="tab-btn active" data-tab="overview"    onclick="switchTab('overview')">概覽</button>
        <button class="tab-btn"        data-tab="population"  onclick="switchTab('population')">人口</button>
        <button class="tab-btn"        data-tab="agriculture" onclick="switchTab('agriculture')">農業</button>
        <button class="tab-btn"        data-tab="trade"       onclick="switchTab('trade')">貿易</button>
      </div>
      <div id="tab-panels">
        <div id="panel-overview"    class="panel active"></div>
        <div id="panel-population"  class="panel"></div>
        <div id="panel-agriculture" class="panel"></div>
        <div id="panel-trade" class="panel">
          <div class="sec-title">雙邊貿易比較</div>
          <div class="trade-row">
            <select id="trade-a"><option value="">選擇國家 A</option></select>
            <span style="color:#222;font-size:16px">⇄</span>
            <select id="trade-b"><option value="">選擇國家 B</option></select>
          </div>
          <div style="margin-bottom:16px"><button class="trade-btn" onclick="calcTrade()">查詢雙邊貿易差額</button></div>
          <div id="trade-result" style="color:#333;font-size:13px;font-weight:400">請選擇兩個國家後點擊查詢</div>
        </div>
      </div>
    </div>
  </div>
</div>

const TRV={'840-156':585,'840-124':782,'840-276':202,'840-392':215,'840-484':798,'840-826':155,'156-276':218,'156-392':312,'156-410':310,'156-356':118,'156-036':175,'276-250':168,'276-380':128,'276-616':138,'276-826':105,'392-410':88,'826-250':90,'250-380':85,'076-156':128,'076-840':98,'528-276':145,'528-250':130};
function getBiVol(cA,cB){return TRV[`${cA}-${cB}`]||TRV[`${cB}-${cA}`]||null;}

function buildFlowSVG(dA,dB,bal,biVol){
  const W=284,BW=80,BH=68,BY=14,AZL=BW+5,AZR=W-BW-5,MX=W/2;
  const AR1=BY+20,AR2=BY+48;
  let eAB=null,eBA=null,wA=6,wB=6;
  if(biVol&&bal!==null){
    eAB=Math.round((biVol+bal)/2);eBA=Math.round((biVol-bal)/2);
    const r=Math.max(0.05,Math.min(0.95,eAB/biVol));wA=3+r*16;wB=3+(1-r)*16;
  }else if(bal!==null){wA=bal>0?14:4;wB=bal<0?14:4;}
  const H=BY+BH+44;
  const pf=d=>d.pop>=1000?(d.pop/1000).toFixed(1)+'B':d.pop+'M';
  return `<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="mB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#3a78dd"/></marker>
    <marker id="mR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#dd3a3a"/></marker>
  </defs>
  <rect x="0" y="${BY}" width="${BW}" height="${BH}" rx="6" fill="#080808" stroke="#181818"/>
  <text x="${BW/2}" y="${BY+18}" text-anchor="middle" fill="#fff" font-size="12" font-weight="700" font-family="sans-serif">${dA.nm}</text>
  <text x="${BW/2}" y="${BY+34}" text-anchor="middle" fill="#888" font-size="10" font-family="sans-serif">$${dA.gdp.toFixed(1)}T</text>
  <text x="${BW/2}" y="${BY+50}" text-anchor="middle" fill="#555" font-size="9" font-family="sans-serif">${pf(dA)}</text>
  <rect x="${W-BW}" y="${BY}" width="${BW}" height="${BH}" rx="6" fill="#080808" stroke="#181818"/>
  <text x="${W-BW/2}" y="${BY+18}" text-anchor="middle" fill="#fff" font-size="12" font-weight="700" font-family="sans-serif">${dB.nm}</text>
  <text x="${W-BW/2}" y="${BY+34}" text-anchor="middle" fill="#888" font-size="10" font-family="sans-serif">$${dB.gdp.toFixed(1)}T</text>
  <text x="${W-BW/2}" y="${BY+50}" text-anchor="middle" fill="#555" font-size="9" font-family="sans-serif">${pf(dB)}</text>
  <line x1="${AZL}" y1="${AR1}" x2="${AZR-2}" y2="${AR1}" stroke="#3a78dd" stroke-width="${wA.toFixed(1)}" marker-end="url(#mB)" stroke-linecap="round" opacity="0.9"/>
  <line x1="${AZR}" y1="${AR2}" x2="${AZL+2}" y2="${AR2}" stroke="#dd3a3a" stroke-width="${wB.toFixed(1)}" marker-end="url(#mR)" stroke-linecap="round" opacity="0.9"/>
  ${eAB!==null?`<text x="${MX}" y="${AR1-8}" text-anchor="middle" fill="#88aaff" font-size="10" font-weight="700" font-family="sans-serif">$${eAB}B →</text>`:''}
  ${eBA!==null?`<text x="${MX}" y="${AR2+18}" text-anchor="middle" fill="#ff8888" font-size="10" font-weight="700" font-family="sans-serif">← $${eBA}B</text>`:''}
  <rect x="${MX-60}" y="${BY+BH+8}" width="10" height="4" fill="#3a78dd" rx="1"/>
  <text x="${MX-48}" y="${BY+BH+14}" fill="#5588ee" font-size="9" font-family="sans-serif">${dA.nm} 出口</text>
  <rect x="${MX+20}" y="${BY+BH+8}" width="10" height="4" fill="#dd3a3a" rx="1"/>
  <text x="${MX+32}" y="${BY+BH+14}" fill="#ee5555" font-size="9" font-family="sans-serif">${dB.nm} 出口</text>
  ${biVol?`<text x="${MX}" y="${BY+BH+30}" text-anchor="middle" fill="#2a2a2a" font-size="8.5" font-family="sans-serif">估計雙邊貿易總量 ≈ $${biVol}B</text>`:''}
  </svg>`;
}

const R=2;
let scene,cam,rend,ctrl,gMesh,feat=null,selLn=null,curCode=null,curTab='overview';

function ll2v(lat,lon,r){
  const phi=(90-lat)*Math.PI/180,theta=(lon+180)*Math.PI/180;
  return new THREE.Vector3(-r*Math.sin(phi)*Math.cos(theta),r*Math.cos(phi),r*Math.sin(phi)*Math.sin(theta));
}
function v2ll(v){
  const n=v.clone().normalize();
  const lat=90-Math.acos(Math.max(-1,Math.min(1,n.y)))*180/Math.PI;
  let t=Math.atan2(n.z,-n.x); if(t<0)t+=2*Math.PI;
  return [lat,t*180/Math.PI-180];
}

async function boot(){
  const wrap=document.getElementById('globe-wrap');
  const cv=document.getElementById('globe-canvas');
  const W=wrap.clientWidth,H=wrap.clientHeight;

  rend=new THREE.WebGLRenderer({canvas:cv,antialias:true});
  rend.setPixelRatio(Math.min(devicePixelRatio,2));
  rend.setSize(W,H);
  rend.setClearColor(0x000000); // pure black — no background colour

  scene=new THREE.Scene();
  cam=new THREE.PerspectiveCamera(42,W/H,0.1,100);
  cam.position.z=5;

  // Stars — Points uses PointsMaterial, no lighting needed
  const sp=new Float32Array(12000);
  for(let i=0;i<4000;i++){
    const a=Math.random()*Math.PI*2,b=Math.acos(2*Math.random()-1),r=38+Math.random()*16;
    sp[i*3]=r*Math.sin(b)*Math.cos(a); sp[i*3+1]=r*Math.cos(b); sp[i*3+2]=r*Math.sin(b)*Math.sin(a);
  }
  const sg=new THREE.BufferGeometry(); sg.setAttribute('position',new THREE.BufferAttribute(sp,3));
  scene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0xffffff,size:0.055,sizeAttenuation:true})));

  // Globe sphere — MeshBasicMaterial ignores ALL lights → zero day/night terminator
  gMesh=new THREE.Mesh(
    new THREE.SphereGeometry(R,80,80),
    new THREE.MeshBasicMaterial({color:0x040810}) // very dark navy, not reactive to light
  );
  scene.add(gMesh);
  // NO lights, NO atmosphere mesh, NO texture

  // OrbitControls
  ctrl=new THREE.OrbitControls(cam,rend.domElement);
  ctrl.enablePan=false; ctrl.enableZoom=false;
  ctrl.enableDamping=true; ctrl.dampingFactor=0.07;
  ctrl.autoRotate=true; ctrl.autoRotateSpeed=0.45;
  ctrl.addEventListener('start',()=>ctrl.autoRotate=false);

  // Load world topology
  const topo=await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
  feat=topojson.feature(topo,topo.objects.countries);

  // Country border lines (blue-white, wireframe style)
  const mesh=topojson.mesh(topo,topo.objects.countries);
  const pts=[];
  const addL=c=>{for(let i=0;i<c.length-1;i++){pts.push(ll2v(c[i][1],c[i][0],R*1.001));pts.push(ll2v(c[i+1][1],c[i+1][0],R*1.001));}};
  if(mesh.type==='MultiLineString') mesh.coordinates.forEach(addL);
  else if(mesh.type==='LineString') addL(mesh.coordinates);
  scene.add(new THREE.LineSegments(
    new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({color:0x3a70bb,opacity:0.65,transparent:true})
  ));

  rend.domElement.addEventListener('click',onClick);
  rend.domElement.addEventListener('mousemove',onHover);
  window.addEventListener('resize',onResize);

  // Populate trade dropdowns
  Object.entries(CD).sort(([,a],[,b])=>a.nm.localeCompare(b.nm,'zh')).forEach(([c,d])=>{
    ['trade-a','trade-b'].forEach(id=>{
      const o=document.createElement('option'); o.value=c; o.textContent=d.nm;
      document.getElementById(id).appendChild(o);
    });
  });

  const ld=document.getElementById('loading'); ld.style.opacity='0'; setTimeout(()=>ld.style.display='none',400);
  (function loop(){requestAnimationFrame(loop); ctrl.update(); rend.render(scene,cam);})();
}

function onResize(){
  const w=document.getElementById('globe-wrap');
  cam.aspect=w.clientWidth/w.clientHeight; cam.updateProjectionMatrix(); rend.setSize(w.clientWidth,w.clientHeight);
}
function doCast(e){
  const rect=rend.domElement.getBoundingClientRect();
  const m=new THREE.Vector2(((e.clientX-rect.left)/rect.width)*2-1,-((e.clientY-rect.top)/rect.height)*2+1);
  const ray=new THREE.Raycaster(); ray.setFromCamera(m,cam);
  const h=ray.intersectObject(gMesh); return h.length?v2ll(h[0].point):null;
}
function getCode(lat,lon){
  if(!feat)return null;
  for(const f of feat.features) if(d3.geoContains(f,[lon,lat])) return String(f.id);
  return null;
}
function onClick(e){const ll=doCast(e); if(!ll)return; const c=getCode(ll[0],ll[1]); if(c&&CD[c])selectCountry(c);}
let lastHov=0;
function onHover(e){
  if(Date.now()-lastHov<55)return; lastHov=Date.now();
  const tip=document.getElementById('tooltip'),ll=doCast(e);
  if(!ll){tip.style.display='none';return;}
  const c=getCode(ll[0],ll[1]);
  if(c&&CD[c]){
    const rect=rend.domElement.getBoundingClientRect();
    tip.textContent=CD[c].nm; tip.style.display='block';
    tip.style.left=(e.clientX-rect.left+16)+'px'; tip.style.top=(e.clientY-rect.top-36)+'px';
  } else tip.style.display='none';
}
function hilight(code){
  if(selLn){scene.remove(selLn);selLn=null;}
  if(!feat)return;
  const f=feat.features.find(x=>String(x.id)===code); if(!f?.geometry)return;
  const pts=[];
  const addR=ring=>{for(let i=0;i<ring.length-1;i++){pts.push(ll2v(ring[i][1],ring[i][0],R*1.003));pts.push(ll2v(ring[i+1][1],ring[i+1][0],R*1.003));}};
  const g=f.geometry;
  if(g.type==='Polygon')g.coordinates.forEach(addR);
  else if(g.type==='MultiPolygon')g.coordinates.forEach(p=>p.forEach(addR));
  selLn=new THREE.LineSegments(new THREE.BufferGeometry().setFromPoints(pts),new THREE.LineBasicMaterial({color:0xffcc33}));
  scene.add(selLn);
}
function flyTo(lat,lon){
  ctrl.autoRotate=false;
  const tgt=ll2v(lat,lon,5.0),src=cam.position.clone(); let t=0;
  (function s(){t=Math.min(1,t+0.022);const e=t<.5?2*t*t:-1+(4-2*t)*t;cam.position.lerpVectors(src,tgt,e);cam.lookAt(0,0,0);if(t<1)requestAnimationFrame(s);})();
}

// ===== SELECT COUNTRY =====
function selectCountry(code,fly=true){
  curCode=code; hilight(code);
  if(fly&&feat){const f=feat.features.find(x=>String(x.id)===code);if(f){const c=d3.geoCentroid(f);if(c)flyTo(c[1],c[0]);}}
  const d=CD[code];
  const rank=Object.entries(CD).sort(([,a],[,b])=>b.gdp-a.gdp).findIndex(([c])=>c===code)+1;
  document.getElementById('c-name').textContent=d.nm;
  document.getElementById('c-sub').textContent=`ISO ${code}  ·  GDP 全球第 ${rank} 大  ·  2023 年估計`;
  document.getElementById('hero').style.display='none';
  document.getElementById('country-info').style.display='flex';
  switchTab(curTab);
}

// ===== TABS =====
function switchTab(tab){
  curTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
  if(!curCode)return;
  if(tab==='overview')renderOverview(curCode);
  else if(tab==='population')renderPopulation(curCode);
  else if(tab==='agriculture')renderAgriculture(curCode);
}
window.switchTab=switchTab;

  const maxE=Math.max(...d.exp.map(x=>x.val));
  const maxI=Math.max(...d.imp.map(x=>x.val));
  const barRow=(x,maxV,cls)=>`
    <div class="ti-row">
      <div class="ti-top"><span class="ti-name">${x.nm}</span><span class="ti-val">$${x.val}B</span></div>
      <div class="ti-bg"><div class="ti-fill ${cls}" style="width:${Math.round(x.val/maxV*100)}%"></div></div>
    </div>`;
  document.getElementById('panel-overview').innerHTML=`
    <div class="metric"><span class="m-lbl">人口數</span><span class="m-val">${pop}</span></div>
    <div class="metric"><span class="m-lbl">人均 GDP</span><span class="m-val">$${d.gdpC.toLocaleString()}</span></div>
    <div class="metric"><span class="m-lbl">總 GDP</span><span class="m-val">$${d.gdp.toFixed(1)} 兆美元</span></div>
    <div class="metric"><span class="m-lbl">GDP 平減指數</span><span class="m-val">${d.def.toFixed(1)}</span></div>
    <div class="metric"><span class="m-lbl">CPI</span><span class="m-val">${d.cpi.toFixed(1)}</span></div>
    <div class="metric"><span class="m-lbl">核心 CPI</span><span class="m-val">${d.ccpi.toFixed(1)}</span></div>
    <div class="metric"><span class="m-lbl">CPI 年增率</span><span class="m-val" style="color:${d.cpiYoy>50?'#ee4444':d.cpiYoy>10?'#ee9922':d.cpiYoy<2?'#44cc66':'#fff'}">${d.cpiYoy}%</span></div>
    <div class="sec-title">▲ 主要出口商品（十億美元）</div>
    ${d.exp.map(x=>barRow(x,maxE,'ti-exp')).join('')}
    <div class="sec-title">▼ 主要進口商品（十億美元）</div>
    ${d.imp.map(x=>barRow(x,maxI,'ti-imp')).join('')}
    <div class="sec-title" style="margin-top:20px;padding-top:12px;border-top:1px solid #0a0a0a">資料來源</div>
    <div style="font-size:11px;color:#555;line-height:2.1;font-weight:400">
      GDP / 人口：IMF World Economic Outlook 2023<br>
      CPI / 通膨：OECD Statistics & 各國統計局<br>
      貿易數據：UN Comtrade / WTO 2023<br>
      農業出口：FAO / UN Comtrade 2023<br>
      人口結構：UN Population Division 2023
    </div>`;
}

// ===== POPULATION PYRAMID =====
function renderPopulation(code){
  const d=CD[code],[y,w,o]=d.age;
  const groups=[
    ['0–14歲',y*0.515,y*0.485],
    ['15–29歲',w*0.300*0.510,w*0.300*0.490],
    ['30–44歲',w*0.300*0.506,w*0.300*0.494],
    ['45–64歲',w*0.400*0.500,w*0.400*0.500],
    ['65–79歲',o*0.650*0.487,o*0.650*0.513],
    ['80歲以上',o*0.350*0.442,o*0.350*0.558],
  ];
  const maxV=Math.max(...groups.flatMap(([,m,f])=>[m,f]));
  const TW=268,TH=210,mL=50,mR=6,mT=6,mB=28;
  const iW=TW-mL-mR,iH=TH-mT-mB,bH=Math.floor(iH/groups.length),mid=iW/2,sc=(mid-5)/maxV;
  let svg=`<svg width="${TW}" height="${TH}" xmlns="http://www.w3.org/2000/svg"><defs>
    <linearGradient id="mg" x1="1" y1="0" x2="0" y2="0"><stop offset="0%" stop-color="#2a6acc"/><stop offset="100%" stop-color="#0a3266"/></linearGradient>
    <linearGradient id="fg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#cc2a3a"/><stop offset="100%" stop-color="#660a14"/></linearGradient>
  </defs><g transform="translate(${mL},${mT})">`;
  [maxV*0.5,maxV].forEach(v=>{
    svg+=`<line x1="${mid-v*sc}" y1="0" x2="${mid-v*sc}" y2="${iH}" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>`;
    svg+=`<line x1="${mid+v*sc}" y1="0" x2="${mid+v*sc}" y2="${iH}" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>`;
  });
  [...groups].reverse().forEach(([lbl,m,f],i)=>{
    const y2=i*bH,mW=m*sc,fW=f*sc;
    svg+=`<rect x="${mid-mW-1}" y="${y2+2}" width="${mW}" height="${bH-4}" fill="url(#mg)" rx="2"/>`;
    svg+=`<rect x="${mid+1}" y="${y2+2}" width="${fW}" height="${bH-4}" fill="url(#fg)" rx="2"/>`;
    svg+=`<text x="-3" y="${y2+bH/2+4}" text-anchor="end" font-size="8.5" fill="#333" font-family="sans-serif">${lbl}</text>`;
  });
  svg+=`<line x1="${mid}" y1="0" x2="${mid}" y2="${iH}" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>`;
  [maxV*0.5,maxV].forEach(v=>{
    svg+=`<text x="${mid-v*sc}" y="${iH+11}" text-anchor="middle" font-size="7.5" fill="#222" font-family="sans-serif">${v.toFixed(1)}%</text>`;
    svg+=`<text x="${mid+v*sc}" y="${iH+11}" text-anchor="middle" font-size="7.5" fill="#222" font-family="sans-serif">${v.toFixed(1)}%</text>`;
  });
  svg+=`<rect x="${mid-52}" y="${iH+15}" width="8" height="8" fill="url(#mg)" rx="1"/>`;
  svg+=`<text x="${mid-41}" y="${iH+23}" font-size="9" fill="#2a6acc" font-family="sans-serif" font-weight="bold">男性</text>`;
  svg+=`<rect x="${mid+18}" y="${iH+15}" width="8" height="8" fill="url(#fg)" rx="1"/>`;
  svg+=`<text x="${mid+29}" y="${iH+23}" font-size="9" fill="#cc2a3a" font-family="sans-serif" font-weight="bold">女性</text>`;
  svg+=`</g></svg>`;
  const dep=((y+o)/w*100).toFixed(1),agi=(o/y*100).toFixed(1);
  document.getElementById('panel-population').innerHTML=`
    <div class="sec-title">人口金字塔</div>
    <div style="margin:8px -4px 16px">${svg}</div>
    <div class="sec-title">年齡分佈</div>
    ${[['0–14 歲（少年）',y,'#2a6acc'],['15–64 歲（工作人口）',w,'#2acc5a'],['65 歲以上（老年）',o,'#cc2a3a']].map(([l,v,c])=>`
    <div class="pop-bar-row">
      <div class="pop-bar-top"><span style="color:#444;font-weight:400">${l}</span><span style="color:#fff;font-weight:700">${v}%</span></div>
      <div class="pop-bar-bg"><div class="pop-bar-fill" style="background:${c};opacity:.75;width:${Math.round(v)}%"></div></div>
    </div>`).join('')}
    <div class="sec-title" style="margin-top:16px">關鍵指標</div>
    <div class="metric"><span class="m-lbl">總人口</span><span class="m-val">${d.pop>=1000?(d.pop/1000).toFixed(2)+'B':d.pop+'M'}</span></div>
    <div class="metric"><span class="m-lbl">扶養比</span><span class="m-val">${dep}%</span></div>
    <div class="metric"><span class="m-lbl">老化指數</span><span class="m-val">${agi}</span></div>`;
}

// ===== AGRICULTURE =====
function renderAgriculture(code){
  const d=CD[code],maxV=Math.max(...d.agri.map(a=>a.val)),total=d.agri.reduce((s,a)=>s+a.val,0);
  document.getElementById('panel-agriculture').innerHTML=`
    <div class="sec-title">主要農產品出口（十億美元）</div>
    ${d.agri.map(a=>`
    <div class="agri-row">
      <div class="agri-top"><span class="agri-name">${a.nm}</span><span class="agri-val">$${a.val.toFixed(1)}B</span></div>
      <div class="agri-bg"><div class="agri-fill" style="width:${Math.round(a.val/maxV*100)}%"></div></div>
    </div>`).join('')}
    <div class="sec-title" style="margin-top:16px">農業摘要</div>
    <div class="metric"><span class="m-lbl">農業出口估算</span><span class="m-val">$${total.toFixed(1)}B</span></div>
    <div class="metric"><span class="m-lbl">最大項目</span><span class="m-val">${d.agri[0].nm}</span></div>
    <div class="metric"><span class="m-lbl">最大項目佔比</span><span class="m-val">${(d.agri[0].val/total*100).toFixed(0)}%</span></div>`;
}

// ===== BILATERAL TRADE =====
function calcTrade(){
  const cA=document.getElementById('trade-a').value,cB=document.getElementById('trade-b').value;
  const el=document.getElementById('trade-result');
  if(!cA||!cB){el.innerHTML='<span style="color:#222">請選擇兩個國家</span>';return;}
  if(cA===cB){el.innerHTML='<span style="color:#222">請選擇不同的國家</span>';return;}
  const dA=CD[cA],dB=CD[cB];
  const bal=dA.tr?.[cB]!==undefined?dA.tr[cB]:dB.tr?.[cA]!==undefined?-dB.tr[cA]:null;
  const biVol=getBiVol(cA,cB);
  const card=d=>`<div class="trade-card"><div class="trade-card-lbl">${d.nm}</div><div class="trade-card-gdp">$${d.gdp.toFixed(1)}T</div><div class="trade-card-gpc">$${d.gdpC.toLocaleString()} / 人</div></div>`;
  let html=`<div class="sec-title">雙邊貿易流量圖</div><div style="margin:10px -4px 12px">${buildFlowSVG(dA,dB,bal,biVol)}</div>`;
  if(bal!==null){
    const pos=bal>=0,abs=Math.abs(bal),col=pos?'#2acc5a':'#cc2a3a',bA=Math.max(6,Math.min(94,50+bal*0.1));
    html+=`<div style="font-size:26px;font-weight:700;color:${col};margin-bottom:4px">${pos?'+':'-'}$${abs}B</div>
      <div style="font-size:12px;color:#888;margin-bottom:12px;font-weight:400">${pos?dA.nm:dB.nm} 享有貿易順差</div>
      <div style="display:flex;height:8px;border-radius:4px;overflow:hidden;gap:2px">
        <div style="width:${bA}%;background:#1a5a2a;border-radius:3px 0 0 3px;min-width:4px"></div>
        <div style="width:${100-bA}%;background:#5a1a1a;border-radius:0 3px 3px 0;min-width:4px"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:10px;margin-top:5px;color:#555;font-weight:400">
        <span>${dA.nm} 出口</span><span>${dB.nm} 出口</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px">${card(dA)}${card(dB)}</div>`;
  }else{
    html+=`<div style="font-size:11px;color:#555;margin-bottom:10px">暫無 ${dA.nm} ↔ ${dB.nm} 詳細數據</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">${card(dA)}${card(dB)}</div>`;
  }
  el.innerHTML=html;
}
window.calcTrade=calcTrade;

// ===== SEARCH =====
const si=document.getElementById('search-input'),sd=document.getElementById('search-results');
si.addEventListener('input',function(){
  const q=this.value.trim();
  if(!q){sd.style.display='none';return;}
  const m=Object.entries(CD).filter(([,d])=>d.nm.includes(q)||d.nm.toLowerCase().includes(q.toLowerCase()));
  if(!m.length){sd.style.display='none';return;}
  sd.innerHTML=m.slice(0,6).map(([c,d])=>`<div class="sr-item" onclick="searchSel('${c}')">${d.nm}</div>`).join('');
  sd.style.display='block';
});
function searchSel(code){sd.style.display='none';si.value='';selectCountry(code,true);}
window.searchSel=searchSel;
document.addEventListener('click',e=>{if(!e.target.closest('#search-box'))sd.style.display='none';});

boot();
</script>
