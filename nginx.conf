server {
    listen ${PORT};
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /globe {
        try_files $uri $uri/ /globe/index.html;
    }

    location /invest {
        try_files $uri $uri/ /invest/index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/html text/css application/javascript;
    gzip_min_length 1024;
}
